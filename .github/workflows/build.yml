name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Cache Chocolatey download cache
        uses: actions/cache@v5
        with:
          path: C:\Users\runneradmin\AppData\Local\Temp\chocolatey
          key: choco-dl-${{ runner.os }}-cr-13.0.34

      - name: Install Crystal Reports for Visual Studio
        run: choco install crystalreports-for-visualstudio -y --no-progress --force

      - name: Restore NuGet packages
        working-directory: Source
        run: nuget restore CrystalReportsNinja.sln

      - name: Build Release
        working-directory: Source
        run: msbuild CrystalReportsNinja.sln /p:Configuration=Release /p:Platform="Any CPU" /m

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: CrystalReportsNinja
          path: Source/CrystalReportsNinja/bin/Release/
